<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Burak's VFX Library</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080808; font-family: 'JetBrains Mono', 'Courier New', monospace; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0e0e0e; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
  .card { transition: border-color 0.15s, transform 0.15s; }
  .card:hover { border-color: #2a2a2a !important; transform: translateY(-1px); }
  .tag { background: #111; border: 1px solid #1e1e1e; color: #555; border-radius: 4px; padding: 2px 7px; font-size: 10px; letter-spacing: 1px; }
  .cat-btn { background: none; border: 1px solid #1a1a1a; color: #444; border-radius: 5px; padding: 5px 12px; font-size: 10px; letter-spacing: 1px; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; }
  .cat-btn:hover, .cat-btn.active { background: #111; border-color: #333; color: #ccc; }
  .ref-row:hover { background: #0d0d0d !important; }
  input:focus, select:focus, textarea:focus { border-color: #333 !important; outline: none; }
  .action-btn { width: 100%; background: #111; border: 1px solid #1e1e1e; border-radius: 8px; color: #ccc; padding: 14px 18px; font-size: 12px; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; cursor: pointer; text-align: left; transition: background 0.1s; }
  .action-btn:hover { background: #181818; }
  .action-btn.danger { color: #ff4444; }
  .img-upload-box { border: 1px dashed #2a2a2a; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .img-upload-box:hover { border-color: #444; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CATEGORIES = ["All","Fire","Smoke","Explosion","Water","Lightning","Magic","Dust","Impact","Ambient","UI","Other"];

const INITIAL_REFS = [
  { id: 1, title: "Ember Burst Loop", category: "Fire", tags: ["loop","stylized","orange"], status: "approved", rating: 5, notes: "Great energy for boss hit reactions", url: "", date: "2026-03-10", thumbnail: "🔥", image: null },
  { id: 2, title: "Smoke Trail - Slow", category: "Smoke", tags: ["slow-mo","realistic"], status: "review", rating: 3, notes: "Might need color grading for night scenes", url: "", date: "2026-03-22", thumbnail: "💨", image: null },
  { id: 3, title: "Shockwave Ring", category: "Explosion", tags: ["shockwave","ground","impact"], status: "approved", rating: 4, notes: "Perfect for ground slam moves", url: "", date: "2026-04-01", thumbnail: "💥", image: null },
];

const STATUS_COLORS = {
  approved: { bg: "#0d2b1a", border: "#1aff7a", text: "#1aff7a" },
  review:   { bg: "#2b1e00", border: "#ffaa00", text: "#ffaa00" },
  rejected: { bg: "#2b0d0d", border: "#ff4444", text: "#ff4444" },
  idea:     { bg: "#0d1a2b", border: "#44aaff", text: "#44aaff" },
};

const STORAGE_KEY = "vfx_refs_v3";

function loadRefs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; }
}
function saveRefs(refs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(refs)); } catch(e) { console.warn("Storage full?", e); }
}

function resizeImage(dataUrl, maxW = 800) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.src = dataUrl;
  });
}

function readImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) { reject("Not an image"); return; }
    const reader = new FileReader();
    reader.onload = async (e) => {
      const resized = await resizeImage(e.target.result);
      resolve(resized);
    };
    reader.onerror = () => reject("Read failed");
    reader.readAsDataURL(file);
  });
}

function useLongPress(onLongPress, onClick, delay = 500) {
  const timerRef = useRef(null);
  const firedRef = useRef(false);
  const movedRef = useRef(false);
  const start = useCallback((e) => {
    movedRef.current = false;
    firedRef.current = false;
    timerRef.current = setTimeout(() => {
      if (!movedRef.current) { firedRef.current = true; onLongPress(e); }
    }, delay);
  }, [onLongPress, delay]);
  const move = useCallback(() => { movedRef.current = true; clearTimeout(timerRef.current); }, []);
  const cancel = useCallback(() => { clearTimeout(timerRef.current); }, []);
  const end = useCallback((e) => {
    clearTimeout(timerRef.current);
    if (!firedRef.current && !movedRef.current) onClick(e);
  }, [onClick]);
  return { onPointerDown: start, onPointerMove: move, onPointerUp: end, onPointerLeave: cancel, onPointerCancel: cancel };
}

const Stars = ({ rating, setRating }) =>
  Array.from({ length: 5 }).map((_, i) => (
    <span key={i} onClick={() => setRating && setRating(i + 1)}
      style={{ cursor: setRating ? "pointer" : "default", color: i < rating ? "#ffcc00" : "#2a2a2a", fontSize: "14px", letterSpacing: "1px" }}>★</span>
  ));

const labelStyle = { fontSize: "9px", letterSpacing: "2px", color: "#555", textTransform: "uppercase", display: "block", marginBottom: "4px" };
const inputStyle = { width: "100%", background: "#141414", border: "1px solid #222", borderRadius: "6px", color: "#ddd", padding: "8px 10px", fontSize: "13px", fontFamily: "'JetBrains Mono', monospace", boxSizing: "border-box" };
const btnPrimary = { background: "#1aff7a", color: "#000", border: "none", borderRadius: "6px", padding: "9px 20px", fontSize: "11px", fontFamily: "'JetBrains Mono', monospace", fontWeight: "700", letterSpacing: "2px", cursor: "pointer" };
const btnSecondary = { background: "transparent", color: "#555", border: "1px solid #222", borderRadius: "6px", padding: "9px 20px", fontSize: "11px", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "2px", cursor: "pointer" };

function ActionSheet({ item, onEdit, onDelete, onClose }) {
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 2000, display: "flex", alignItems: "flex-end", justifyContent: "center", padding: "16px" }}>
      <div style={{ background: "#0e0e0e", border: "1px solid #1e1e1e", borderRadius: "14px", padding: "16px", width: "100%", maxWidth: "400px", fontFamily: "'JetBrains Mono', monospace" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 4px 16px", borderBottom: "1px solid #161616", marginBottom: "12px" }}>
          {item.image
            ? <img src={item.image} alt="" style={{ width: 40, height: 40, borderRadius: "6px", objectFit: "cover" }} />
            : <span style={{ fontSize: "28px" }}>{item.thumbnail}</span>
          }
          <div>
            <div style={{ fontSize: "13px", fontWeight: 700, color: "#ddd" }}>{item.title}</div>
            <div style={{ fontSize: "10px", color: "#444" }}>{item.category}</div>
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
          <button className="action-btn" onClick={onEdit}>✏️&nbsp;&nbsp;EDIT REFERENCE</button>
          <button className="action-btn danger" onClick={onDelete}>🗑️&nbsp;&nbsp;DELETE REFERENCE</button>
          <button className="action-btn" onClick={onClose} style={{ color: "#444", marginTop: "4px" }}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

function Modal({ item, onClose, onSave }) {
  const initTags = Array.isArray(item?.tags) ? item.tags.join(", ") : (item?.tags || "");
  const [form, setForm] = useState(item
    ? { ...item, tags: initTags }
    : { title: "", category: "Fire", tags: "", status: "idea", rating: 3, notes: "", url: "", thumbnail: "✨", image: null }
  );
  const [imgLoading, setImgLoading] = useState(false);
  const fileInputRef = useRef(null);
  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const EMOJIS = ["🔥","💨","💥","💧","⚡","✨","🌫️","🌪️","🎇","🎆","⭐","🌟"];

  const handleImagePick = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImgLoading(true);
    try {
      const data = await readImageFile(file);
      update("image", data);
    } catch(err) {
      alert("Could not load image: " + err);
    } finally {
      setImgLoading(false);
      e.target.value = "";
    }
  };

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}>
      <div style={{ background: "#0e0e0e", border: "1px solid #222", borderRadius: "12px", padding: "24px", width: "100%", maxWidth: "480px", maxHeight: "92vh", overflowY: "auto", color: "#eee", fontFamily: "'JetBrains Mono', monospace" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
          <span style={{ color: "#888", fontSize: "11px", letterSpacing: "3px" }}>{item?.id ? "EDIT REFERENCE" : "NEW REFERENCE"}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#555", fontSize: "20px", cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ marginBottom: "16px" }}>
          <label style={labelStyle}>REFERENCE IMAGE (stored locally on your device)</label>
          <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleImagePick} />
          {form.image ? (
            <div style={{ position: "relative", marginTop: "6px" }}>
              <img src={form.image} alt="reference" style={{ width: "100%", maxHeight: "180px", objectFit: "cover", borderRadius: "8px", border: "1px solid #222" }} />
              <button onClick={() => update("image", null)}
                style={{ position: "absolute", top: "8px", right: "8px", background: "rgba(0,0,0,0.7)", border: "1px solid #333", color: "#ff4444", borderRadius: "6px", padding: "4px 10px", fontSize: "10px", cursor: "pointer", fontFamily: "'JetBrains Mono', monospace" }}>
                REMOVE
              </button>
            </div>
          ) : (
            <div className="img-upload-box" onClick={() => fileInputRef.current.click()} style={{ marginTop: "6px" }}>
              {imgLoading
                ? <span style={{ fontSize: "11px", color: "#444", letterSpacing: "1px" }}>LOADING...</span>
                : <span style={{ fontSize: "11px", color: "#333", letterSpacing: "1px" }}>📁 TAP TO PICK FROM GALLERY</span>
              }
            </div>
          )}
        </div>
        {!form.image && (
          <div style={{ marginBottom: "16px" }}>
            <label style={labelStyle}>OR PICK AN ICON</label>
            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginTop: "6px" }}>
              {EMOJIS.map(e => (
                <span key={e} onClick={() => update("thumbnail", e)}
                  style={{ fontSize: "22px", cursor: "pointer", padding: "4px 8px", borderRadius: "6px", background: form.thumbnail === e ? "#1a1a1a" : "transparent", border: form.thumbnail === e ? "1px solid #444" : "1px solid transparent" }}>{e}</span>
              ))}
            </div>
          </div>
        )}
        <div style={{ marginBottom: "14px" }}>
          <label style={labelStyle}>TITLE</label>
          <input value={form.title} onChange={e => update("title", e.target.value)} style={inputStyle} placeholder="e.g. Lava Drip Loop" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "14px" }}>
          <div>
            <label style={labelStyle}>CATEGORY</label>
            <select value={form.category} onChange={e => update("category", e.target.value)} style={inputStyle}>
              {CATEGORIES.filter(c => c !== "All").map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStyle}>STATUS</label>
            <select value={form.status} onChange={e => update("status", e.target.value)} style={inputStyle}>
              {Object.keys(STATUS_COLORS).map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{ marginBottom: "14px" }}>
          <label style={labelStyle}>RATING</label>
          <div style={{ display: "flex", gap: "4px", marginTop: "6px" }}>
            <Stars rating={form.rating} setRating={v => update("rating", v)} />
          </div>
        </div>
        <div style={{ marginBottom: "14px" }}>
          <label style={labelStyle}>TAGS (comma separated)</label>
          <input value={form.tags} onChange={e => update("tags", e.target.value)} style={inputStyle} placeholder="loop, stylized, fire" />
        </div>
        <div style={{ marginBottom: "14px" }}>
          <label style={labelStyle}>REFERENCE URL</label>
          <input value={form.url} onChange={e => update("url", e.target.value)} style={inputStyle} placeholder="https://..." />
        </div>
        <div style={{ marginBottom: "20px" }}>
          <label style={labelStyle}>NOTES</label>
          <textarea value={form.notes} onChange={e => update("notes", e.target.value)} rows={3} style={{ ...inputStyle, resize: "vertical" }} placeholder="Art direction notes, context, usage..." />
        </div>
        <div style={{ display: "flex", gap: "10px", justifyContent: "flex-end" }}>
          <button onClick={onClose} style={btnSecondary}>CANCEL</button>
          <button onClick={() => {
            const tags = typeof form.tags === "string" ? form.tags.split(",").map(t => t.trim()).filter(Boolean) : form.tags;
            onSave({ ...form, tags, id: form.id || Date.now(), date: form.date || new Date().toISOString().split("T")[0] });
          }} style={btnPrimary}>SAVE</button>
        </div>
      </div>
    </div>
  );
}

function RefCard({ r, onPress, onLongPress }) {
  const sc = STATUS_COLORS[r.status] || STATUS_COLORS.idea;
  const handlers = useLongPress(() => onLongPress(r), () => onPress(r), 500);
  return (
    <div {...handlers} className="card"
      style={{ background: "#0c0c0c", border: "1px solid #161616", borderRadius: "10px", overflow: "hidden", cursor: "pointer", userSelect: "none", WebkitUserSelect: "none", touchAction: "manipulation" }}>
      {r.image
        ? <img src={r.image} alt="" style={{ width: "100%", height: "120px", objectFit: "cover", display: "block" }} />
        : <div style={{ height: "80px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "36px", background: "#0a0a0a" }}>{r.thumbnail}</div>
      }
      <div style={{ padding: "14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "6px" }}>
          <div style={{ fontSize: "12px", fontWeight: 700, color: "#ddd", flex: 1, marginRight: "8px" }}>{r.title}</div>
          <span style={{ fontSize: "8px", padding: "3px 6px", borderRadius: "4px", background: sc.bg, color: sc.text, border: `1px solid ${sc.border}`, letterSpacing: "1px", flexShrink: 0 }}>{r.status.toUpperCase()}</span>
        </div>
        <div style={{ fontSize: "10px", color: "#444", marginBottom: "8px" }}>{r.category} · {r.date}</div>
        <div style={{ display: "flex", marginBottom: "8px" }}><Stars rating={r.rating} /></div>
        {r.notes && <div style={{ fontSize: "11px", color: "#444", marginBottom: "8px", lineHeight: "1.5", overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{r.notes}</div>}
        <div style={{ display: "flex", gap: "4px", flexWrap: "wrap", marginBottom: "6px" }}>
          {(r.tags || []).slice(0, 3).map(t => <span key={t} className="tag">{t}</span>)}
        </div>
        <div style={{ fontSize: "9px", color: "#1e1e1e", letterSpacing: "1px" }}>HOLD FOR OPTIONS</div>
      </div>
    </div>
  );
}

function RefRow({ r, i, total, onPress, onLongPress }) {
  const sc = STATUS_COLORS[r.status] || STATUS_COLORS.idea;
  const handlers = useLongPress(() => onLongPress(r), () => onPress(r), 500);
  return (
    <div {...handlers} className="ref-row"
      style={{ display: "flex", alignItems: "center", gap: "12px", padding: "12px 16px", borderBottom: i < total - 1 ? "1px solid #111" : "none", cursor: "pointer", background: "#0c0c0c", userSelect: "none", WebkitUserSelect: "none", touchAction: "manipulation" }}>
      {r.image
        ? <img src={r.image} alt="" style={{ width: 36, height: 36, borderRadius: "6px", objectFit: "cover", flexShrink: 0 }} />
        : <span style={{ fontSize: "20px", flexShrink: 0 }}>{r.thumbnail}</span>
      }
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: "12px", fontWeight: 700, color: "#ddd" }}>{r.title}</div>
        <div style={{ fontSize: "10px", color: "#444" }}>{r.category} · {r.date}</div>
      </div>
      <div style={{ display: "flex", gap: "2px", flexShrink: 0 }}><Stars rating={r.rating} /></div>
      <span style={{ fontSize: "8px", padding: "3px 7px", borderRadius: "4px", background: sc.bg, color: sc.text, border: `1px solid ${sc.border}`, letterSpacing: "1px", flexShrink: 0 }}>{r.status.toUpperCase()}</span>
    </div>
  );
}

function App() {
  const [refs, setRefs] = useState(() => loadRefs() || INITIAL_REFS);
  const [category, setCategory] = useState("All");
  const [statusFilter, setStatusFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("date");
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const [actionItem, setActionItem] = useState(null);
  const [view, setView] = useState("grid");

  useEffect(() => { saveRefs(refs); }, [refs]);

  const filtered = refs
    .filter(r => category === "All" || r.category === category)
    .filter(r => statusFilter === "All" || r.status === statusFilter)
    .filter(r => {
      const q = search.toLowerCase();
      return !q || r.title.toLowerCase().includes(q) || (r.tags || []).some(t => t.toLowerCase().includes(q)) || (r.notes || "").toLowerCase().includes(q);
    })
    .sort((a, b) => {
      if (sortBy === "rating") return b.rating - a.rating;
      if (sortBy === "title") return a.title.localeCompare(b.title);
      return b.date.localeCompare(a.date);
    });

  const saveRef = (item) => {
    setRefs(r => item.id && r.find(x => x.id === item.id) ? r.map(x => x.id === item.id ? item : x) : [...r, item]);
    setModal(null); setSelected(null);
  };
  const deleteRef = (id) => {
    setRefs(r => r.filter(x => x.id !== id));
    setSelected(null); setActionItem(null);
  };

  const stats = {
    total: refs.length,
    approved: refs.filter(r => r.status === "approved").length,
    review: refs.filter(r => r.status === "review").length,
    avgRating: refs.length ? (refs.reduce((a, b) => a + b.rating, 0) / refs.length).toFixed(1) : "—",
  };

  return (
    <div style={{ minHeight: "100vh", background: "#080808", color: "#ccc", fontFamily: "'JetBrains Mono', 'Courier New', monospace", padding: "20px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "24px", flexWrap: "wrap", gap: "12px" }}>
        <div>
          <div style={{ fontSize: "9px", letterSpacing: "4px", color: "#333", marginBottom: "4px" }}>GAME VFX REFERENCE TRACKER</div>
          <div style={{ fontSize: "20px", fontWeight: 700, color: "#eee" }}>Burak's VFX Library</div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          <button onClick={() => setView(v => v === "grid" ? "list" : "grid")} style={{ ...btnSecondary, padding: "7px 12px", fontSize: "10px" }}>
            {view === "grid" ? "⊟ LIST" : "⊞ GRID"}
          </button>
          <button onClick={() => setModal("new")} style={{ ...btnPrimary, fontSize: "10px", padding: "8px 14px" }}>+ NEW</button>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "8px", marginBottom: "20px" }}>
        {[
          { label: "TOTAL", value: stats.total },
          { label: "OK", value: stats.approved, color: "#1aff7a" },
          { label: "REVIEW", value: stats.review, color: "#ffaa00" },
          { label: "AVG ★", value: stats.avgRating, color: "#ffcc00" },
        ].map(s => (
          <div key={s.label} style={{ background: "#0d0d0d", border: "1px solid #161616", borderRadius: "8px", padding: "12px 10px" }}>
            <div style={{ fontSize: "8px", letterSpacing: "1px", color: "#333", marginBottom: "4px" }}>{s.label}</div>
            <div style={{ fontSize: "18px", fontWeight: 700, color: s.color || "#555" }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "12px" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="SEARCH..." style={{ ...inputStyle, flex: 1, minWidth: "120px", fontSize: "11px", padding: "7px 10px" }} />
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ ...inputStyle, width: "120px", fontSize: "11px", padding: "7px 8px" }}>
          {["All","approved","review","rejected","idea"].map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ ...inputStyle, width: "110px", fontSize: "11px", padding: "7px 8px" }}>
          <option value="date">DATE</option>
          <option value="rating">RATING</option>
          <option value="title">A–Z</option>
        </select>
      </div>
      <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "20px" }}>
        {CATEGORIES.map(c => (
          <button key={c} className={`cat-btn${category === c ? " active" : ""}`} onClick={() => setCategory(c)}>
            {c.toUpperCase()}
          </button>
        ))}
      </div>
      {view === "grid" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: "10px" }}>
          {filtered.map(r => (
            <RefCard key={r.id} r={r} onPress={r => setSelected(r)} onLongPress={r => setActionItem(r)} />
          ))}
          {filtered.length === 0 && <div style={{ color: "#333", fontSize: "12px", letterSpacing: "2px", padding: "40px 0" }}>NO REFS FOUND</div>}
        </div>
      )}
      {view === "list" && (
        <div style={{ border: "1px solid #161616", borderRadius: "10px", overflow: "hidden" }}>
          {filtered.map((r, i) => (
            <RefRow key={r.id} r={r} i={i} total={filtered.length} onPress={r => setSelected(r)} onLongPress={r => setActionItem(r)} />
          ))}
          {filtered.length === 0 && <div style={{ color: "#333", fontSize: "12px", letterSpacing: "2px", padding: "40px 20px" }}>NO REFS FOUND</div>}
        </div>
      )}
      {actionItem && !modal && (
        <ActionSheet
          item={actionItem}
          onEdit={() => { setModal(actionItem); setActionItem(null); }}
          onDelete={() => deleteRef(actionItem.id)}
          onClose={() => setActionItem(null)}
        />
      )}
      {selected && !modal && !actionItem && (
        <div onClick={e => e.target === e.currentTarget && setSelected(null)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "16px" }}>
          <div style={{ background: "#0e0e0e", border: "1px solid #1e1e1e", borderRadius: "12px", width: "100%", maxWidth: "460px", color: "#eee", fontFamily: "'JetBrains Mono', monospace", maxHeight: "90vh", overflowY: "auto" }}>
            {(() => {
              const sc = STATUS_COLORS[selected.status] || STATUS_COLORS.idea;
              return <>
                {selected.image && <img src={selected.image} alt="" style={{ width: "100%", maxHeight: "200px", objectFit: "cover", borderRadius: "12px 12px 0 0", display: "block" }} />}
                <div style={{ padding: "24px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "12px" }}>
                    {!selected.image && <span style={{ fontSize: "36px" }}>{selected.thumbnail}</span>}
                    <div style={{ display: "flex", gap: "8px", alignItems: "center", marginLeft: "auto" }}>
                      <button onClick={() => { setModal(selected); setSelected(null); }} style={{ ...btnSecondary, fontSize: "10px", padding: "6px 12px" }}>EDIT</button>
                      <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#444", fontSize: "20px", cursor: "pointer" }}>✕</button>
                    </div>
                  </div>
                  <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#444", marginBottom: "4px" }}>{selected.category.toUpperCase()} · {selected.date}</div>
                  <div style={{ fontSize: "18px", fontWeight: 700, color: "#eee", marginBottom: "10px" }}>{selected.title}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
                    <div style={{ display: "flex" }}><Stars rating={selected.rating} /></div>
                    <span style={{ fontSize: "9px", padding: "3px 8px", borderRadius: "4px", background: sc.bg, color: sc.text, border: `1px solid ${sc.border}`, letterSpacing: "1px" }}>{selected.status.toUpperCase()}</span>
                  </div>
                  {selected.notes && <div style={{ fontSize: "12px", color: "#777", lineHeight: "1.7", marginBottom: "14px", padding: "12px", background: "#111", borderRadius: "6px", borderLeft: "2px solid #222" }}>{selected.notes}</div>}
                  {selected.url && <div style={{ fontSize: "11px", marginBottom: "14px" }}><a href={selected.url} target="_blank" rel="noreferrer" style={{ color: "#1aff7a", textDecoration: "none" }}>↗ VIEW REFERENCE</a></div>}
                  <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "20px" }}>
                    {(selected.tags || []).map(t => <span key={t} className="tag">{t}</span>)}
                  </div>
                  <div style={{ display: "flex", gap: "8px", justifyContent: "flex-end" }}>
                    <button onClick={() => deleteRef(selected.id)} style={{ ...btnSecondary, color: "#ff4444", borderColor: "#2a1111", fontSize: "10px", padding: "7px 14px" }}>DELETE</button>
                  </div>
                </div>
              </>;
            })()}
          </div>
        </div>
      )}
      {(modal === "new" || (modal && modal.id)) && (
        <Modal item={modal === "new" ? null : modal} onClose={() => setModal(null)} onSave={saveRef} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
